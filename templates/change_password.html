{% extends 'base.html' %}

{% block title %}Parolni o'zgartirish{% endblock %}

{% block content %}
<div class="top-bar">
    <h1>Parolni o'zgartirish</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" style="max-width: 500px;">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">O'zgartirish</button>
            <a href="{% url 'profile' %}" class="btn btn-outline">Bekor qilish</a>
        </form>
    </div>
</div>
{% endblock %}
